<h2>图片展示方式对比</h2>
<p class="subtitle">针对“很矮或很窄的图片占用过高高度”的问题，下面是三个可选方向。点击你觉得合适的方案。</p>

<style>
  .image-option-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }
  .image-option-card {
    cursor: pointer;
  }
  .phone-frame {
    background: #f6f7f8;
    border: 1px solid #e3e6e8;
    border-radius: 18px;
    padding: 14px;
    min-height: 360px;
  }
  .post-row {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 10px;
    align-items: start;
  }
  .avatar-dot {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #b7c2ca, #e2e6e9);
  }
  .meta-line {
    height: 10px;
    width: 42%;
    border-radius: 6px;
    background: #cfd6da;
    margin-bottom: 12px;
  }
  .text-line {
    height: 9px;
    border-radius: 6px;
    background: #dfe4e7;
    margin: 7px 0;
  }
  .text-line.short {
    width: 62%;
  }
  .image-slot {
    margin: 14px 0;
    width: 100%;
    height: 150px;
    border-radius: 10px;
    background: #e9ecef;
    overflow: hidden;
  }
  .actual-wide-image {
    height: 46px;
    background: linear-gradient(90deg, #62b1a0, #e2cf80 48%, #dd8d79);
  }
  .option-a .actual-wide-image {
    height: 150px;
  }
  .option-b .image-slot,
  .option-c .image-slot {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-b .actual-wide-image,
  .option-c .actual-wide-image {
    width: 100%;
    border-radius: 7px;
  }
  .option-c .image-slot {
    background: #fbfbfa;
    border: 1px solid rgba(33, 37, 41, 0.06);
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.10);
  }
  .caption {
    font-size: 12px;
    color: #6b7280;
    margin-top: 10px;
    line-height: 1.45;
  }
  @media (max-width: 900px) {
    .image-option-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="image-option-grid">
  <div class="card image-option-card option-a" data-choice="a-current" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="phone-frame">
        <div class="post-row">
          <div class="avatar-dot"></div>
          <div>
            <div class="meta-line"></div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
            <div class="image-slot">
              <div class="actual-wide-image"></div>
            </div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 现状：方形缩略图裁剪</h3>
      <p>阅读流稳定，但矮图被裁成高块，容易显得浪费空间。</p>
    </div>
  </div>

  <div class="card image-option-card option-b" data-choice="b-centered" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="phone-frame">
        <div class="post-row">
          <div class="avatar-dot"></div>
          <div>
            <div class="meta-line"></div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
            <div class="image-slot">
              <div class="actual-wide-image"></div>
            </div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 容器固定，图片垂直居中</h3>
      <p>高度稳定，矮图不被拉伸；空白会更明显，但阅读位置不跳。</p>
    </div>
  </div>

  <div class="card image-option-card option-c" data-choice="c-centered-shadow" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="phone-frame">
        <div class="post-row">
          <div class="avatar-dot"></div>
          <div>
            <div class="meta-line"></div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
            <div class="image-slot">
              <div class="actual-wide-image"></div>
            </div>
            <div class="text-line"></div>
            <div class="text-line short"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 居中 + 轻阴影容器</h3>
      <p>同样保持高度稳定，同时让图片区域更像独立预览卡片。</p>
    </div>
  </div>
</div>

<p class="caption">建议方向：C，但阴影要很轻，避免详情页变成卡片堆叠。实现上只改图片 block 和富文本附件的展示 frame/contentMode，不改 HTML 解析规则。</p>
